services:
  db:
    image: postgres:16
    container_name: bank_db_container
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5555:5432"

  backend:
    build:
      context: .
      dockerfile: bank/Dockerfile
    container_name: bank_backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"

